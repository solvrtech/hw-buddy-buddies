<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeworkBuddy Characters Viewer</title>
    <script src="https://unpkg.com/@rive-app/canvas@2.38.2"></script>
    <style>
      :root {
        --bg: #0f1115;
        --card-bg: #1a1d24;
        --card-border: #2a2e38;
        --text: #e8e9ec;
        --text-dim: #9a9ea8;
        --accent: #5b8cff;
        --accent-hover: #4a7bef;
        --stop: #ff5b6b;
        --stop-hover: #ef4a5b;
        --trigger: #2a2e38;
        --trigger-hover: #3a3f4c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px 20px;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      h1 {
        text-align: center;
        font-size: 28px;
        font-weight: 600;
        margin: 0 0 8px;
      }

      p.subtitle {
        text-align: center;
        color: var(--text-dim);
        margin: 0 0 36px;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
        max-width: 1100px;
        margin: 0 auto;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 550px;
      }

      .card-title {
        font-size: 16px;
        font-weight: 600;
        text-transform: capitalize;
        margin-bottom: 12px;
      }

      .canvas-wrap {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 14px;
        position: relative;
        /* Tidak lagi interaktif lewat hover, jadi tidak perlu cursor pointer */
        contain: layout paint;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .status {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        color: var(--text-dim);
      }

      .status.playing {
        color: #6bffa0;
      }

      .controls {
        display: flex;
        gap: 10px;
        width: 100%;
        margin-bottom: 10px;
      }

      .trigger-controls {
        display: flex;
        gap: 8px;
        width: 100%;
        flex-wrap: wrap;
      }

      button {
        flex: 1;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s ease,
          opacity 0.15s ease;
        color: white;
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .btn-play {
        background: var(--accent);
      }
      .btn-play:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .btn-stop {
        background: var(--stop);
      }
      .btn-stop:hover:not(:disabled) {
        background: var(--stop-hover);
      }

      .btn-trigger {
        background: var(--trigger);
        font-size: 13px;
        padding: 8px 10px;
        text-transform: capitalize;
      }
      .btn-trigger:hover:not(:disabled) {
        background: var(--trigger-hover);
      }

      .load-error {
        color: var(--stop);
        font-size: 12px;
        text-align: center;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Animated Buddy Characters</h1>
    <p class="subtitle">
      Press the Play button to start the intro animation, and click on the
      trigger buttons to switch between states (available when the "idle" state
      is ready).
    </p>

    <div class="grid" id="grid"></div>

    <script>
      const animations = [{ key: "owl", label: "Owl", file: "owl.riv" }];

      // Nama-nama trigger pada ViewModel1 di file owl.riv
      const triggerNames = ["idle", "bored", "success", "failed"];

      const grid = document.getElementById("grid");
      const instances = {};

      animations.forEach((anim) => {
        // Build card markup
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
      <div class="card-title">${anim.label}</div>
      <div class="canvas-wrap">
        <canvas id="canvas-${anim.key}"></canvas>
        <div class="status" id="status-${anim.key}">idle</div>
      </div>
      <div class="controls">
        <button class="btn-play" id="play-${anim.key}">▶ Play</button>
        <button class="btn-stop" id="stop-${anim.key}" disabled>■ Stop</button>
      </div>
      <div class="trigger-controls" id="triggers-${anim.key}">
        ${triggerNames
          .map(
            (t) =>
              `<button class="btn-trigger" id="trigger-${anim.key}-${t}" disabled>${t}</button>`,
          )
          .join("")}
      </div>
    `;
        grid.appendChild(card);

        const canvas = card.querySelector(`#canvas-${anim.key}`);
        const playBtn = card.querySelector(`#play-${anim.key}`);
        const stopBtn = card.querySelector(`#stop-${anim.key}`);
        const statusEl = card.querySelector(`#status-${anim.key}`);
        const triggerButtons = triggerNames.map((t) =>
          card.querySelector(`#trigger-${anim.key}-${t}`),
        );

        let playbackName = null;
        let isStateMachine = false;
        let isLoaded = false;
        let riveInstance = null;

        function setTriggerButtonsEnabled(enabled) {
          triggerButtons.forEach((btn) => {
            if (btn) btn.disabled = !enabled;
          });
        }

        function resizeCanvas() {
          if (!isLoaded) return;
          const rect = canvas.getBoundingClientRect();
          if (rect.width === 0 || rect.height === 0) return;
          riveInstance.resizeDrawingSurfaceToCanvas();
        }

        // Membuat (atau membuat ulang) Rive instance dari nol.
        // Dipanggil saat pertama load dan saat Stop — sehingga setiap sesi
        // Play selalu mendapat autoBind yang segar dan SM + ViewModel
        // terhubung dengan benar sejak awal.
        function initRive() {
          if (riveInstance) {
            try {
              riveInstance.cleanup();
            } catch (_) {}
          }
          isLoaded = false;
          playBtn.disabled = true;
          stopBtn.disabled = true;
          setTriggerButtonsEnabled(false);
          statusEl.classList.remove("playing");
          statusEl.style.color = "";
          statusEl.textContent = "loading…";

          riveInstance = new rive.Rive({
            src: anim.file,
            canvas: canvas,
            autoplay: false,
            autoBind: true,
            stateMachines: "State Machine 1",
            useOffscreenRenderer: true,
            onStateChange: (event) => {
              const states = event.data;
              console.log(`[${anim.key}] state berubah ->`, states);
              if (states?.length)
                statusEl.textContent = states[states.length - 1];
            },
            onLoad: () => {
              isLoaded = true;

              const smNames = riveInstance.stateMachineNames;
              const animNames = riveInstance.animationNames;
              if (smNames?.length > 0) {
                playbackName = smNames[0];
                isStateMachine = true;
              } else if (animNames?.length > 0) {
                playbackName = animNames[0];
                isStateMachine = false;
              }

              const smInputs =
                isStateMachine && playbackName
                  ? riveInstance.stateMachineInputs(playbackName)
                  : null;
              console.log(`[${anim.key}] onLoad:`, {
                playbackName,
                smInputs: smInputs?.map((i) => `${i.name}(type:${i.type})`),
                viewModelBound: !!riveInstance.viewModelInstance,
                vmProperties: riveInstance.viewModelInstance?.properties,
              });

              const vmBound = !!riveInstance.viewModelInstance;
              resizeCanvas();
              statusEl.textContent = vmBound ? "ready" : "no viewmodel";
              if (!vmBound) statusEl.style.color = "#ff5b6b";
              playBtn.disabled = false;
              stopBtn.disabled = true;
              setTriggerButtonsEnabled(false);
            },
            onLoadError: (err) => {
              statusEl.textContent = "error";
              statusEl.style.color = "#ff5b6b";
              console.error(`Failed to load ${anim.file}`, err);
            },
          });

          instances[anim.key] = riveInstance;
        }

        initRive();

        const resizeObserver = new ResizeObserver(() => resizeCanvas());
        resizeObserver.observe(canvas);

        function doPlay() {
          if (!isLoaded) return;
          if (playBtn.disabled) return;

          if (playbackName) riveInstance.play(playbackName);
          else riveInstance.play();

          statusEl.textContent = "playing";
          statusEl.classList.add("playing");
          playBtn.disabled = true;
          stopBtn.disabled = false;
          setTriggerButtonsEnabled(true);
        }

        function doStop() {
          if (stopBtn.disabled) return;
          // Re-init dari nol: autoBind + SM terhubung ulang secara bersih,
          // tanpa risiko ViewModel instance yang stale.
          initRive();
        }

        function fireTrigger(triggerName) {
          if (!isLoaded) return;

          // Metode 1: SM inputs standar
          if (isStateMachine && playbackName) {
            const inputs = riveInstance.stateMachineInputs(playbackName);
            if (inputs?.length > 0) {
              const input = inputs.find((i) => i.name === triggerName);
              if (input) {
                input.fire();
                console.log(`[${anim.key}] SM input fired: ${triggerName}`);
                return;
              }
              console.log(
                `[${anim.key}] SM inputs [${inputs.map((i) => i.name).join(", ")}] tidak ada "${triggerName}", coba ViewModel...`,
              );
            }
          }

          // Metode 2: ViewModel data binding (via autoBind)
          const vmi = riveInstance.viewModelInstance;
          if (!vmi) {
            console.warn(`[${anim.key}] viewModelInstance null`);
            statusEl.textContent = "no viewmodel";
            return;
          }
          const trigger = vmi.trigger(triggerName);
          if (!trigger) {
            console.warn(
              `[${anim.key}] trigger "${triggerName}" tidak ada. VM properties: ${JSON.stringify(vmi.properties)}`,
            );
            return;
          }
          trigger.trigger();
          console.log(`[${anim.key}] ViewModel trigger fired: ${triggerName}`);
        }

        // Trigger lewat klik tombol play/stop
        playBtn.addEventListener("click", doPlay);
        stopBtn.addEventListener("click", doStop);

        // Trigger lewat klik tombol idle/bored/success/failed
        triggerNames.forEach((name, i) => {
          const btn = triggerButtons[i];
          if (btn) {
            btn.addEventListener("click", () => fireTrigger(name));
          }
        });

        // Saat canvas keluar dari viewport (karena discroll jauh), hentikan
        // render loop instance ini untuk menghemat resource. Saat masuk
        // viewport lagi, resize ulang supaya gambar pasti tampil dengan benar.
        const visibilityObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!isLoaded) return;
              if (entry.isIntersecting) {
                riveInstance.startRendering();
                resizeCanvas();
              } else {
                riveInstance.stopRendering();
              }
            });
          },
          { threshold: 0.01 },
        );
        visibilityObserver.observe(card.querySelector(".canvas-wrap"));
      });
    </script>
  </body>
</html>
